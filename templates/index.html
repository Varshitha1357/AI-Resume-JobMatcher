<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-t">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>AI Job Matcher</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="my-4 text-center">AI Job Matcher</h1>
        <form id="match-form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="resume">Upload Resume (PDF)</label>
                <input type="file" class="form-control-file" id="resume" name="resume" accept=".pdf" required>
            </div>
            <div class="form-group">
                <label for="skills_interests">Skills & Interests</label>
                <textarea class="form-control" id="skills_interests" name="skills_interests" rows="3" placeholder="e.g., Python, Machine Learning, Data Analysis"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Find My Match</button>
        </form>
        <div id="results" class="mt-5">
            <div id="loader" style="display: none;">
                <div class="spinner-border" role="status">
                    <span class="sr-only">Loading...</span>
                </div>
            </div>
            <div id="match-results"></div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
